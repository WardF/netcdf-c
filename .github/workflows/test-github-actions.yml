name: test-github-actions
on: [push]
jobs:
  nc-autotools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [ ac, cmake ]
        hdf5: [ 1.8.20, 1.10.7 ]
        use_nc4: [ nc3, nc4 ]
    steps:
    - name: Set up Included Actions
      uses: actions/checkout@v2
    - name: Install Conda ${{ matrix.hdf5 }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: ${{ matrix.hdf5 }}
        environment-file: .github/workflows/conda-env/${{ matrix.hdf5 }}.txt
    - name: Query User
      run: whoami
    - name: Query System
      run: uname -a
    - name: Directory Info
      run: pwd && ls
    - name: Query Conda
      shell: bash -l {0}
      run: conda list
    - name: Query HDF5
      shell: bash -l {0}
      run: which h5dump
    - name: Run autoreconf
      shell: bash -l {0}
      run: autoreconf -if
    - run: echo "ENABLE_NC4_AC=--disable-netcdf-4" >> $GITHUB_ENV && echo "ENABLE_NC4_CMAKE=ENABLE_NETCDF_4=OFF" >> $GITHUB_ENV
      if: matrix.use_nc4 == 'nc3'
    - run: echo "ENABLE_NC4_AC=--enable-netcdf-4" >> $GITHUB_ENV && echo "ENABLE_NC4_CMAKE=ENABLE_NETCDF_4=ON" >> $GITHUB_ENV
      if: matrix.use_nc4 == 'nc4'
    - name: Configure
      shell: bash -l {0}
      run: ./configure ${ENABLE_NC4_AC}
      if: matrix.build_type == 'ac'
    - name: Build
      shell: bash -l {0}
      run: make -j && make check TESTS="" -j
      if: matrix.build_type == 'ac'
    - name: Test
      shell: bash -l {0}
      run: make check -j
      if: matrix.build_type == 'ac'
