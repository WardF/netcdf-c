name: test-github-actions
on: [push]
jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Included Actions
      uses: actions/checkout@v2
    - name: Query User
      run: whoami
    - name: Query System
      run: uname -a
    - name: Test Print Variable
      env:
        TEST_VAR: "Test Var"
      run: |
        echo "Variable: ${TEST_VAR}"
    - name: Install Conda
      uses: matthewrmshin/conda-action@v1
      with:
        args: conda env create --file conda_req_1.10.7.yml
