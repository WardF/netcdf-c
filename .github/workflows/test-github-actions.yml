name: test-github-actions
on: [push]
jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hdf5: [ 1.8.20, 1.10.7 ]
    steps:
    - name: Set up Included Actions
      uses: actions/checkout@v2
    - name: Query User
      run: whoami
    - name: Query System
      run: uname -a
    - name: Test Print Variable
      env:
        TEST_VAR: "Test Var"
      run: |
        echo "Variable: ${TEST_VAR}"
    - name: Directory Info
      run: pwd && ls
    - name: Install Conda ${{ matrix.hdf5 }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: ${{ matrix.hdf5 }}
        environment-file: .github/workflows/${{ matrix.hdf5 }}.txt
    - name: Query Conda
      shell: bash -l {0}
      run: conda list
    - name : Query HDF5
      shell: bash -l {0}
      run : which h5dump
