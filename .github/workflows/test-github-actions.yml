name: test-github-actions
on: [push]
jobs:
  nc-autotools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hdf5: [ 1.8.20, 1.10.7 ]
        use_nc4: [ nc3, nc4 ]
    env:
      ENABLE_NC4: --enable-netcdf-4
    steps:
    - name: Set up Included Actions
      uses: actions/checkout@v2
    - name: Query User
      run: whoami
    - name: Query System
      run: uname -a
    - name: Test Print Variable
      env:
        TEST_VAR: "Test Var"
      run: |
        echo "Variable: ${TEST_VAR}"
    - name: Directory Info
      run: pwd && ls
    - name: Install Conda ${{ matrix.hdf5 }}
      uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: ${{ matrix.hdf5 }}
        environment-file: .github/workflows/conda-env/${{ matrix.hdf5 }}.txt
    - name: Query Conda
      shell: bash -l {0}
      run: conda list
    - name: Query HDF5
      shell: bash -l {0}
      run: which h5dump
    - name: Run autoreconf
      shell: bash -l {0}
      run: autoreconf -if
    - env:
        ENABLE_NC4: --disable-netcdf-4
      if: matrix.use_nc4 == 'nc3'
    - name : Build and Run Tests
      run: ./configure ${ENABLE_NC4}
